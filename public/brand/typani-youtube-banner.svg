<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="2560" y2="1440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="50%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="iconbg" x1="0" y1="0" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="2560" height="1440" fill="url(#bg)"/>
  <rect width="2560" height="1440" fill="url(#dots)"/>

  <!-- Decorative circles -->
  <circle cx="2300" cy="200" r="500" fill="#10b981" fill-opacity="0.07"/>
  <circle cx="200" cy="1300" r="400" fill="#10b981" fill-opacity="0.06"/>
  <circle cx="2400" cy="1300" r="300" fill="#059669" fill-opacity="0.08"/>

  <!-- Safe zone content (centered 1546x423, vertically centered at y=508 to y=931) -->

  <!-- Icon mark -->
  <g transform="translate(810, 560)">
    <rect width="200" height="200" rx="46" fill="url(#iconbg)"/>
    <!-- Speech bubble -->
    <path d="M33 44 C33 38 38 33 44 33 L156 33 C162 33 167 38 167 44 L167 122 C167 128 162 133 156 133 L112 133 L90 158 L90 133 L44 133 C38 133 33 128 33 122 Z" fill="white" fill-opacity="0.95"/>
    <!-- Star -->
    <path d="M100 55 L107 78 L131 78 L112 92 L119 115 L100 101 L81 115 L88 92 L69 78 L93 78 Z" fill="url(#iconbg)"/>
  </g>

  <!-- Wordmark -->
  <text x="1040" y="690" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="148" font-weight="800" fill="#ffffff" letter-spacing="-3">Typani</text>

  <!-- Divider -->
  <rect x="810" y="720" width="940" height="4" rx="2" fill="#10b981" fill-opacity="0.5"/>

  <!-- Tagline -->
  <text x="1280" y="790" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="400" fill="#a7f3d0" text-anchor="middle" letter-spacing="0.5">AI replies to every Google review — automatically</text>

  <!-- Website -->
  <text x="1280" y="870" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="600" fill="#6ee7b7" text-anchor="middle" letter-spacing="1">typani.com</text>
</svg>
