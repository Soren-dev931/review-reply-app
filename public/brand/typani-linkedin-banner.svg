<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1128" y2="191" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="60%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="iconbg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.055"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1128" height="191" fill="url(#bg)"/>
  <rect width="1128" height="191" fill="url(#dots)"/>
  <rect width="1128" height="191" fill="url(#shine)"/>

  <!-- Decorative circles -->
  <circle cx="1020" cy="-30" r="160" fill="#10b981" fill-opacity="0.10"/>
  <circle cx="1080" cy="220" r="120" fill="#10b981" fill-opacity="0.07"/>

  <!-- Icon mark -->
  <g transform="translate(56, 56)">
    <rect width="80" height="80" rx="18" fill="url(#iconbg)"/>
    <!-- Speech bubble -->
    <path d="M13 17 C13 14.5 15 12.5 17.5 12.5 L62.5 12.5 C65 12.5 67 14.5 67 17 L67 48 C67 50.5 65 52.5 62.5 52.5 L45 52.5 L36 63 L36 52.5 L17.5 52.5 C15 52.5 13 50.5 13 48 Z" fill="white" fill-opacity="0.95"/>
    <!-- Star -->
    <path d="M40 20 L42.5 28 L51 28 L44.5 33 L47 41 L40 36 L33 41 L35.5 33 L29 28 L37.5 28 Z" fill="url(#iconbg)"/>
  </g>

  <!-- Wordmark -->
  <text x="158" y="112" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1">Typani</text>

  <!-- Vertical divider -->
  <rect x="358" y="60" width="2" height="72" rx="1" fill="#10b981" fill-opacity="0.5"/>

  <!-- Tagline -->
  <text x="382" y="98" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#a7f3d0" letter-spacing="0.1">AI replies to every Google review</text>
  <text x="382" y="128" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#a7f3d0" letter-spacing="0.1">— automatically ⚡</text>

  <!-- Website pill (right side) -->
  <rect x="908" y="74" width="164" height="42" rx="21" fill="#10b981" fill-opacity="0.25"/>
  <text x="990" y="100" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#6ee7b7" text-anchor="middle" letter-spacing="0.3">typani.com</text>
</svg>
