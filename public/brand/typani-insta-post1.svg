<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="50%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="iconbg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="cardbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dots)"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="100" r="260" fill="#10b981" fill-opacity="0.10"/>
  <circle cx="100" cy="980" r="200" fill="#10b981" fill-opacity="0.08"/>

  <!-- Logo icon top center -->
  <g transform="translate(460, 100)">
    <rect width="160" height="160" rx="38" fill="url(#iconbg)"/>
    <!-- Speech bubble -->
    <path d="M26 35 C26 30 30 26 35 26 L125 26 C130 26 134 30 134 35 L134 97 C134 102 130 106 125 106 L89 106 L72 128 L72 106 L35 106 C30 106 26 102 26 97 Z" fill="white" fill-opacity="0.95"/>
    <!-- Star -->
    <path d="M80 44 L85 60 L102 60 L89 70 L94 86 L80 76 L66 86 L71 70 L58 60 L75 60 Z" fill="url(#iconbg)"/>
  </g>

  <!-- Wordmark -->
  <text x="540" y="330" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">Typani</text>

  <!-- Divider -->
  <rect x="240" y="360" width="600" height="3" rx="2" fill="#10b981" fill-opacity="0.5"/>

  <!-- Main headline -->
  <text x="540" y="460" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">Never miss a Google review</text>
  <text x="540" y="520" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">again. ⚡</text>

  <!-- Subtext -->
  <text x="540" y="600" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="400" fill="#a7f3d0" text-anchor="middle">AI writes the perfect reply to every</text>
  <text x="540" y="642" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="400" fill="#a7f3d0" text-anchor="middle">review — automatically.</text>

  <!-- 3 feature cards -->
  <!-- Card 1 -->
  <rect x="90" y="710" width="270" height="130" rx="20" fill="url(#cardbg)" stroke="#10b981" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="225" y="762" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" text-anchor="middle">🤖</text>
  <text x="225" y="800" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#ffffff" text-anchor="middle">AI-Powered</text>
  <text x="225" y="826" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#6ee7b7" text-anchor="middle">Smart responses</text>

  <!-- Card 2 -->
  <rect x="405" y="710" width="270" height="130" rx="20" fill="url(#cardbg)" stroke="#10b981" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="540" y="762" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" text-anchor="middle">⚡</text>
  <text x="540" y="800" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#ffffff" text-anchor="middle">Automated</text>
  <text x="540" y="826" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#6ee7b7" text-anchor="middle">Runs on autopilot</text>

  <!-- Card 3 -->
  <rect x="720" y="710" width="270" height="130" rx="20" fill="url(#cardbg)" stroke="#10b981" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="855" y="762" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" text-anchor="middle">📈</text>
  <text x="855" y="800" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#ffffff" text-anchor="middle">Boosts SEO</text>
  <text x="855" y="826" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#6ee7b7" text-anchor="middle">Rank higher on Google</text>

  <!-- CTA pill -->
  <rect x="340" y="890" width="400" height="64" rx="32" fill="#10b981"/>
  <text x="540" y="930" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">Free to start → typani.com</text>
</svg>
